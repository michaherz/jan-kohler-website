<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Jan Kohler | Coming Soon</title>
  <meta name="description" content="Executive coaching by Jan Kohler — coming soon."/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: {
      colors: { "primary": "#5e5e5e", "on-primary": "#f8f8f8", "on-surface": "#2b333a", "on-surface-variant": "#586067", "surface": "#f8f9fc", "surface-container-lowest": "#ffffff", "surface-container-low": "#f1f4f8", "surface-container-high": "#e2e9f0", "primary-container": "#e2e2e2" },
      borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
      fontFamily: { headline: ["Newsreader"], body: ["Manrope"], label: ["Manrope"] }
    }}}
  </script>
  <style>
    body { overflow-x: hidden; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .text-editorial-gradient {
      background: linear-gradient(to bottom right, #2b333a, #5e5e5e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ─── Animated background ─────────────────────────── */
    .bg-animation {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background: #f8f9fc;
      pointer-events: none;
    }

    /* Slow rotating conic gradient behind everything — adds depth & motion */
    .bg-animation::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 160vmax; height: 160vmax;
      transform-origin: center center;
      background: conic-gradient(
        from 0deg at 50% 50%,
        transparent 0deg,
        rgba(200, 213, 224, 0.22) 40deg,
        transparent 120deg,
        rgba(226, 233, 240, 0.28) 180deg,
        transparent 240deg,
        rgba(209, 219, 229, 0.2) 320deg,
        transparent 360deg
      );
      animation: rotate-bg 55s linear infinite;
      will-change: transform;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      will-change: transform;
    }
    .blob-1 {
      width: 70vw; height: 70vw; max-width: 780px; max-height: 780px;
      background: radial-gradient(circle, #b7c7d3 0%, transparent 68%);
      top: -18%; left: -12%;
      opacity: 0.7;
      animation: float-a 16s ease-in-out infinite;
    }
    .blob-2 {
      width: 60vw; height: 60vw; max-width: 680px; max-height: 680px;
      background: radial-gradient(circle, #d8e2ec 0%, transparent 68%);
      bottom: -18%; right: -12%;
      opacity: 0.8;
      animation: float-b 19s ease-in-out infinite;
    }
    .blob-3 {
      width: 50vw; height: 50vw; max-width: 560px; max-height: 560px;
      background: radial-gradient(circle, #b8c7d4 0%, transparent 68%);
      top: 50%; left: 50%;
      opacity: 0.55;
      animation: float-c 22s ease-in-out infinite;
    }
    .blob-4 {
      width: 40vw; height: 40vw; max-width: 450px; max-height: 450px;
      background: radial-gradient(circle, #eaeef4 0%, transparent 68%);
      top: 18%; right: 18%;
      opacity: 0.6;
      animation: float-d 14s ease-in-out infinite;
    }

    @keyframes float-a {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(140px, 80px) scale(1.25); }
      50% { transform: translate(200px, 160px) scale(1.1); }
      75% { transform: translate(80px, 180px) scale(0.95); }
    }
    @keyframes float-b {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-120px, -100px) scale(1.2); }
      50% { transform: translate(-180px, -40px) scale(1.05); }
      75% { transform: translate(-60px, -160px) scale(0.9); }
    }
    @keyframes float-c {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      33% { transform: translate(calc(-50% + 160px), calc(-50% - 100px)) scale(1.3); }
      66% { transform: translate(calc(-50% - 140px), calc(-50% + 120px)) scale(0.85); }
    }
    @keyframes float-d {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-160px, 120px) scale(1.2); }
      66% { transform: translate(120px, 60px) scale(0.9); }
    }
    @keyframes rotate-bg {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Floating particles (tiny dots drifting upward) */
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(94, 94, 94, 0.25);
      bottom: -10px;
      animation: rise linear infinite;
      will-change: transform, opacity;
    }
    .particle:nth-child(1)  { left: 10%;  animation-duration: 22s; animation-delay: 0s;   width: 3px; height: 3px; }
    .particle:nth-child(2)  { left: 25%;  animation-duration: 28s; animation-delay: -8s;  width: 5px; height: 5px; opacity: 0.6; }
    .particle:nth-child(3)  { left: 40%;  animation-duration: 18s; animation-delay: -4s;  width: 2px; height: 2px; }
    .particle:nth-child(4)  { left: 55%;  animation-duration: 26s; animation-delay: -14s; width: 4px; height: 4px; opacity: 0.7; }
    .particle:nth-child(5)  { left: 70%;  animation-duration: 20s; animation-delay: -2s;  width: 3px; height: 3px; }
    .particle:nth-child(6)  { left: 85%;  animation-duration: 30s; animation-delay: -10s; width: 5px; height: 5px; opacity: 0.5; }
    .particle:nth-child(7)  { left: 18%;  animation-duration: 24s; animation-delay: -18s; width: 2px; height: 2px; }
    .particle:nth-child(8)  { left: 62%;  animation-duration: 32s; animation-delay: -6s;  width: 4px; height: 4px; opacity: 0.6; }
    .particle:nth-child(9)  { left: 48%;  animation-duration: 26s; animation-delay: -20s; width: 3px; height: 3px; }
    .particle:nth-child(10) { left: 92%;  animation-duration: 22s; animation-delay: -12s; width: 2px; height: 2px; }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-110vh) translateX(40px);
        opacity: 0;
      }
    }

    /* Subtle noise overlay */
    .bg-animation::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      opacity: 0.06;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .blob, .particle, .bg-animation::before { animation: none !important; }
    }

    /* ─── Logo selector highlighting ──────────────────── */
    #logo { user-select: none; -webkit-user-select: none; }

    /* ─── Login modal ─────────────────────────────────── */
    #login-modal {
      position: fixed; inset: 0; z-index: 9999;
      display: none; align-items: center; justify-content: center;
      background: rgba(43, 51, 58, 0.55);
      backdrop-filter: blur(8px);
      padding: 24px;
    }
    #login-modal.open { display: flex; }
    #login-modal .card {
      background: #f8f9fc;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 32px 80px rgba(43,51,58,0.25);
      position: relative;
    }
    #login-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px;
      background: none; border: none;
      cursor: pointer; color: #5e5e5e;
      display: flex; align-items: center; justify-content: center;
    }
    #login-close:hover { color: #2b333a; }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

  <!-- ── Animated background ──────────────────────────────── -->
  <div class="bg-animation" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- ── Page structure ───────────────────────────────────── -->
  <div class="relative z-10 min-h-screen flex flex-col">

    <!-- Top: Logo -->
    <header class="flex justify-center items-center pt-10 md:pt-16 px-6">
      <a id="logo" class="font-['Newsreader'] text-2xl md:text-3xl tracking-tight text-[#2b333a] no-underline cursor-pointer" title="">Jan Kohler</a>
    </header>

    <!-- Main: Coming Soon + Form -->
    <main class="flex-1 flex items-center justify-center px-6 md:px-12 py-12 md:py-20">
      <div class="max-w-xl w-full text-center">

        <div class="space-y-6 mb-14">
          <span class="font-label text-xs tracking-[0.3em] uppercase text-primary">Excellence in Coaching</span>
          <h1 class="font-headline text-5xl md:text-7xl leading-[1.05] text-editorial-gradient">
            Coming<br/><span class="italic">Soon</span>
          </h1>
          <p class="font-body text-lg text-primary max-w-md mx-auto leading-relaxed">
            Something refined is on its way. Leave a note and we will reach out the moment the doors open.
          </p>
        </div>

        <!-- Contact form -->
        <form id="cs-form" action="https://api.web3forms.com/submit" method="POST" novalidate class="space-y-4">
          <input type="hidden" name="access_key" value="a4c2d27f-ddee-48a8-ac73-6192445c99fe"/>
          <input type="hidden" name="subject" value="Coming Soon — new inquiry via jankohlercoaching.de"/>
          <input type="hidden" name="from_name" value="jankohlercoaching.de (Coming Soon)"/>
          <input type="checkbox" name="botcheck" class="hidden" style="display:none" tabindex="-1" aria-hidden="true"/>

          <input id="cs-name" name="name" required type="text" placeholder="Your name" class="w-full bg-white/80 backdrop-blur-sm border-none rounded-full px-6 py-4 text-center text-on-surface placeholder:text-primary/40 font-body focus:ring-1 focus:ring-primary/30 outline-none"/>
          <input id="cs-email" name="email" required type="email" placeholder="Your email" class="w-full bg-white/80 backdrop-blur-sm border-none rounded-full px-6 py-4 text-center text-on-surface placeholder:text-primary/40 font-body focus:ring-1 focus:ring-primary/30 outline-none"/>
          <textarea id="cs-message" name="message" required rows="3" placeholder="A short note — what brought you here?" class="w-full bg-white/80 backdrop-blur-sm border-none rounded-lg px-6 py-4 text-center text-on-surface placeholder:text-primary/40 font-body focus:ring-1 focus:ring-primary/30 outline-none resize-none"></textarea>
          <button id="cs-submit" type="submit" class="inline-block bg-on-surface text-on-primary rounded-full px-12 py-4 text-sm font-label tracking-widest uppercase hover:scale-[1.02] transition-transform duration-300 shadow-lg disabled:opacity-60 disabled:cursor-not-allowed">
            <span id="cs-submit-label">Get notified</span>
          </button>
          <div id="cs-error" class="hidden text-sm font-body text-red-600"></div>
        </form>

        <div id="cs-success" class="hidden space-y-4 py-8">
          <span class="font-label text-[10px] tracking-widest uppercase text-primary">Message received</span>
          <h3 class="font-headline text-3xl italic">Thank you.</h3>
          <p class="font-body text-primary text-sm">We will be in touch.</p>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 px-6 md:px-12">
      <div class="flex justify-center gap-8 font-['Manrope'] text-xs uppercase tracking-widest text-[#5e5e5e]/70">
        <a class="hover:text-[#2b333a] transition-all no-underline" href="imprint.html">Imprint</a>
        <a class="hover:text-[#2b333a] transition-all no-underline" href="privacy.html">Privacy</a>
      </div>
      <p class="text-center mt-4 font-['Manrope'] text-[10px] uppercase tracking-widest text-[#5e5e5e]/50">© 2026 Jan Kohler</p>
    </footer>

  </div>

  <!-- ── Login modal (hidden) ─────────────────────────────── -->
  <div id="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-title">
    <div class="card">
      <button id="login-close" aria-label="Close"><span class="material-symbols-outlined" style="font-size:20px">close</span></button>
      <span class="font-label text-[10px] tracking-widest uppercase text-primary block mb-2">Access</span>
      <h3 id="login-title" class="font-headline text-2xl mb-6 text-on-surface">Enter site</h3>
      <form id="login-form" class="space-y-4" autocomplete="off">
        <input id="login-user" type="text" placeholder="Username" autocomplete="off" autocapitalize="off" spellcheck="false" class="w-full bg-surface-container-low border-none rounded-full px-6 py-3 text-on-surface placeholder:text-primary/40 font-body focus:ring-1 focus:ring-primary/30 outline-none"/>
        <input id="login-pass" type="password" placeholder="Password" autocomplete="off" class="w-full bg-surface-container-low border-none rounded-full px-6 py-3 text-on-surface placeholder:text-primary/40 font-body focus:ring-1 focus:ring-primary/30 outline-none"/>
        <button type="submit" class="w-full bg-on-surface text-on-primary rounded-full py-3 text-sm font-label tracking-widest uppercase hover:scale-[1.01] transition-transform">Enter</button>
        <div id="login-error" class="hidden text-sm text-red-600 font-body text-center"></div>
      </form>
    </div>
  </div>

  <script>
  // ── Hidden login: triple-click on logo ───────────────────
  (function() {
    const logo = document.getElementById('logo');
    const modal = document.getElementById('login-modal');
    const closeBtn = document.getElementById('login-close');
    const form = document.getElementById('login-form');
    const userEl = document.getElementById('login-user');
    const passEl = document.getElementById('login-pass');
    const errEl = document.getElementById('login-error');

    let clickCount = 0;
    let clickTimer = null;

    function openModal() {
      modal.classList.add('open');
      errEl.classList.add('hidden');
      userEl.value = '';
      passEl.value = '';
      setTimeout(() => userEl.focus(), 50);
    }
    function closeModal() {
      modal.classList.remove('open');
    }

    logo.addEventListener('click', (e) => {
      e.preventDefault();
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 600);
      if (clickCount >= 3) {
        clickCount = 0;
        openModal();
      }
    });

    // Close on ESC or backdrop click
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    closeBtn.addEventListener('click', closeModal);

    // Login submit
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const u = userEl.value.trim();
      const p = passEl.value;
      if (u === 'Jan' && p === 'comingsoon') {
        location.href = 'site.html';
      } else {
        errEl.textContent = 'Invalid credentials';
        errEl.classList.remove('hidden');
        passEl.value = '';
        passEl.focus();
      }
    });
  })();

  // ── Contact form (Web3Forms AJAX) ────────────────────────
  (function() {
    const form = document.getElementById('cs-form');
    if (!form) return;
    const errorEl = document.getElementById('cs-error');
    const successEl = document.getElementById('cs-success');
    const submitBtn = document.getElementById('cs-submit');
    const submitLabel = document.getElementById('cs-submit-label');
    const originalLabel = submitLabel.textContent;

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }
    function clearError() {
      errorEl.textContent = '';
      errorEl.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      if (!form.checkValidity()) {
        const firstInvalid = form.querySelector(':invalid');
        if (firstInvalid) firstInvalid.focus();
        showError('Please fill in all fields correctly.');
        return;
      }
      submitBtn.disabled = true;
      submitLabel.textContent = 'Sending…';
      try {
        const formData = new FormData(form);
        const res = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success) {
          form.classList.add('hidden');
          successEl.classList.remove('hidden');
        } else {
          throw new Error(data.message || 'Unknown error. Please try again later.');
        }
      } catch (err) {
        showError('Submission failed: ' + err.message);
        submitBtn.disabled = false;
        submitLabel.textContent = originalLabel;
      }
    });
  })();
  </script>

</body>
</html>
